<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - PrepWise AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/leaderboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <span>PrepWise AI</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="aptitude.html" class="nav-item">
                <i class="fas fa-calculator"></i>
                <span>Aptitude</span>
            </a>
            <a href="coding.html" class="nav-item">
                <i class="fas fa-code"></i>
                <span>Coding</span>
            </a>
            <a href="resume.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Resume Analyzer</span>
            </a>
            <a href="interview.html" class="nav-item">
                <i class="fas fa-microphone"></i>
                <span>Mock Interview</span>
            </a>
            <a href="roadmap.html" class="nav-item">
                <i class="fas fa-route"></i>
                <span>Company Roadmaps</span>
            </a>
            <a href="leaderboard.html" class="nav-item active">
                <i class="fas fa-trophy"></i>
                <span>Leaderboard</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h2>Leaderboard</h2>
            </div>
            <div class="topbar-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="user-menu">
                    <img src="https://ui-avatars.com/api/?name=User&background=6C63FF&color=fff" alt="User" class="user-avatar">
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <!-- Top 3 -->
            <section class="top-three">
                <div class="podium-card rank-2">
                    <div class="rank-badge silver">2</div>
                    <img src="https://ui-avatars.com/api/?name=2nd+Place&background=6C63FF&color=fff" alt="2nd Place">
                    <h4>—</h4>
                    <p class="xp-count"><i class="fas fa-star"></i> — XP</p>
                    <div class="stats-mini">
                        <span><i class="fas fa-fire"></i> —</span>
                        <span><i class="fas fa-trophy"></i> —</span>
                    </div>
                </div>
                <div class="podium-card rank-1">
                    <div class="rank-badge gold">1</div>
                    <div class="crown"><i class="fas fa-crown"></i></div>
                    <img src="https://ui-avatars.com/api/?name=1st+Place&background=6C63FF&color=fff" alt="1st Place">
                    <h4>—</h4>
                    <p class="xp-count"><i class="fas fa-star"></i> — XP</p>
                    <div class="stats-mini">
                        <span><i class="fas fa-fire"></i> —</span>
                        <span><i class="fas fa-trophy"></i> —</span>
                    </div>
                </div>
                <div class="podium-card rank-3">
                    <div class="rank-badge bronze">3</div>
                    <img src="https://ui-avatars.com/api/?name=3rd+Place&background=6C63FF&color=fff" alt="3rd Place">
                    <h4>—</h4>
                    <p class="xp-count"><i class="fas fa-star"></i> — XP</p>
                    <div class="stats-mini">
                        <span><i class="fas fa-fire"></i> —</span>
                        <span><i class="fas fa-trophy"></i> —</span>
                    </div>
                </div>
            </section>

            <!-- Leaderboard Table -->
            <section class="leaderboard-table">
                <div class="table-header">
                    <h3>Global Rankings</h3>
                    <div class="filter-tabs">
                        <button class="tab-btn active" data-period="all">All Time</button>
                        <button class="tab-btn" data-period="month">This Month</button>
                        <button class="tab-btn" data-period="week">This Week</button>
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>User</th>
                                <th>XP</th>
                                <th>Streak</th>
                                <th>Tests</th>
                                <th>Problems</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <!-- Leaderboard entries will be loaded dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Your Rank -->
            <section class="your-rank-card">
                <h4>Your Rank</h4>
                <div class="rank-info">
                    <div class="rank-number">#<span id="yourRank">--</span></div>
                    <div class="rank-details">
                        <p><strong id="yourXP">0</strong> XP</p>
                        <p><span id="xpToNext">0</span> XP to next rank</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="js/leaderboard.js"></script>
</body>
</html>
