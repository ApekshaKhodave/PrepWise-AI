<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Practice - PrepWise AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/coding.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <span>PrepWise AI</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="aptitude.html" class="nav-item">
                <i class="fas fa-calculator"></i>
                <span>Aptitude</span>
            </a>
            <a href="coding.html" class="nav-item active">
                <i class="fas fa-code"></i>
                <span>Coding</span>
            </a>
            <a href="resume.html" class="nav-item">
                <i class="fas fa-file-alt"></i>
                <span>Resume Analyzer</span>
            </a>
            <a href="interview.html" class="nav-item">
                <i class="fas fa-microphone"></i>
                <span>Mock Interview</span>
            </a>
            <a href="roadmap.html" class="nav-item">
                <i class="fas fa-route"></i>
                <span>Company Roadmaps</span>
            </a>
            <a href="leaderboard.html" class="nav-item">
                <i class="fas fa-trophy"></i>
                <span>Leaderboard</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h2>Coding Practice</h2>
            </div>
            <div class="topbar-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="user-menu">
                    <img src="https://i.pravatar.cc/100?img=8" alt="User" class="user-avatar">
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <!-- Filters -->
            <section class="filters-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search problems...">
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="easy">Easy</button>
                    <button class="filter-btn" data-filter="medium">Medium</button>
                    <button class="filter-btn" data-filter="hard">Hard</button>
                </div>
            </section>

            <!-- Problems List -->
            <section class="problems-section">
                <div class="problems-grid" id="problemsGrid">
                    <!-- Problems will be loaded dynamically -->
                </div>
            </section>
        </div>
    </main>

    <!-- Problem Detail Modal -->
    <div id="problemModal" class="modal modal-fullscreen">
        <div class="modal-content problem-detail">
            <div class="problem-header">
                <div class="problem-title-section">
                    <h2 id="problemTitle">Two Sum</h2>
                    <span class="difficulty-badge easy" id="problemDifficulty">Easy</span>
                </div>
                <button class="modal-close">&times;</button>
            </div>
            <div class="problem-body">
                <div class="problem-left">
                    <div class="problem-tabs">
                        <button class="tab-btn active" data-tab="description">Description</button>
                        <button class="tab-btn" data-tab="submissions">Submissions</button>
                        <button class="tab-btn" data-tab="discuss">Discuss</button>
                    </div>
                    <div class="problem-content">
                        <div class="tab-content active" id="description">
                            <div id="problemDescription"></div>
                            <div class="problem-examples">
                                <h4>Examples:</h4>
                                <div id="problemExamples"></div>
                            </div>
                            <div class="problem-constraints">
                                <h4>Constraints:</h4>
                                <div id="problemConstraints"></div>
                            </div>
                        </div>
                        <div class="tab-content" id="submissions">
                            <p>Your submission history will appear here.</p>
                        </div>
                        <div class="tab-content" id="discuss">
                            <p>Discussion forum coming soon!</p>
                        </div>
                    </div>
                </div>
                <div class="problem-right">
                    <div class="code-editor-header">
                        <select id="languageSelect" class="language-select">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="java">Java</option>
                            <option value="cpp">C++</option>
                        </select>
                        <button class="btn btn-sm btn-outline" onclick="resetCode()">
                            <i class="fas fa-redo"></i> Reset
                        </button>
                    </div>
                    <div class="code-editor">
                        <textarea id="codeEditor" spellcheck="false">// Write your code here
function twoSum(nums, target) {
    
}</textarea>
                    </div>
                    <div class="test-results" id="testResults" style="display: none;">
                        <h4>Test Results</h4>
                        <div id="testResultsContent"></div>
                    </div>
                    <div class="code-actions">
                        <button class="btn btn-outline" onclick="runCode()">
                            <i class="fas fa-play"></i> Run Code
                        </button>
                        <button class="btn btn-primary" onclick="submitCode()">
                            <i class="fas fa-check"></i> Submit
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/coding.js"></script>
</body>
</html>
